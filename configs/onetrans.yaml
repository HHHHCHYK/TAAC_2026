data:
  dataset_path: data/datasets--TAAC2026--data_sample_1000/snapshots/2f0ddba721a8323495e73d5229c836df5d603b39/sample_data.parquet
  max_seq_len: 128
  max_feature_tokens: 64
  max_event_features: 12
  val_ratio: 0.2
  label_action_type: 2

model:
  name: onetrans
  vocab_size: 200003
  embedding_dim: 96
  hidden_dim: 192
  dropout: 0.1
  num_layers: 4
  num_heads: 4
  ffn_multiplier: 4
  head_hidden_dim: 384

train:
  seed: 42
  epochs: 5
  batch_size: 32
  eval_batch_size: 64
  learning_rate: 0.0006
  weight_decay: 0.0001
  num_workers: 0
  device: auto
  optimizer_name: adamw
  loss_name: bce
  use_amp: true
  output_dir: outputs/onetrans
