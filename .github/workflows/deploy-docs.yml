name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://puiching-memory.github.io/TAAC_2026/

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Restore EDA figures cache
        id: cache-eda-figures
        uses: actions/cache/restore@v5
        with:
          path: docs/assets/figures/eda
          key: ${{ runner.os }}-docs-eda-${{ hashFiles('pyproject.toml', 'uv.lock', 'src/taac2026/application/reporting/eda_cli.py', 'src/taac2026/domain/metrics.py', 'src/taac2026/infrastructure/io/datasets.py', 'src/taac2026/reporting/dataset_eda.py') }}

      - name: Restore tech timeline cache
        id: cache-tech-timeline
        uses: actions/cache/restore@v5
        with:
          path: |
            .cache/taac2026
            docs/assets/figures/papers/tech-timeline.echarts.json
          key: ${{ runner.os }}-docs-tech-timeline-${{ hashFiles('pyproject.toml', 'uv.lock', 'src/taac2026/application/reporting/timeline_cli.py', 'src/taac2026/reporting/tech_timeline.py') }}
          restore-keys: |
            ${{ runner.os }}-docs-tech-timeline-

      - name: Restore benchmark charts cache
        id: cache-benchmark-charts
        uses: actions/cache/restore@v5
        with:
          path: docs/assets/figures/benchmarks
          key: ${{ runner.os }}-docs-bench-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-keys: |
            ${{ runner.os }}-docs-bench-

      - name: Check if artifact generation is needed
        id: generation-check
        run: |
          if [[ "${{ steps.cache-eda-figures.outputs.cache-hit }}" != "true" ]] || \
             [[ "${{ steps.cache-tech-timeline.outputs.cache-hit }}" != "true" ]] || \
             [[ -z "${{ steps.cache-benchmark-charts.outputs.cache-matched-key }}" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install project dependencies (lightweight)
        if: steps.generation-check.outputs.needed == 'true'
        run: uv sync --locked --no-install-package torch --no-install-package torchrec --no-install-package fbgemm-gpu

      - name: Generate EDA figures
        if: steps.cache-eda-figures.outputs.cache-hit != 'true'
        run: uv run taac-dataset-eda

      - name: Save EDA figures cache
        if: steps.cache-eda-figures.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: docs/assets/figures/eda
          key: ${{ steps.cache-eda-figures.outputs.cache-primary-key }}

      - name: Generate tech timeline
        if: steps.cache-tech-timeline.outputs.cache-hit != 'true'
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: uv run taac-tech-timeline

      - name: Save tech timeline cache
        if: steps.cache-tech-timeline.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .cache/taac2026
            docs/assets/figures/papers/tech-timeline.echarts.json
          key: ${{ steps.cache-tech-timeline.outputs.cache-primary-key }}

      - name: Generate benchmark charts
        if: steps.cache-benchmark-charts.outputs.cache-matched-key == ''
        run: uv run taac-bench-report --fail-on-empty

      - name: Save benchmark charts cache
        if: steps.cache-benchmark-charts.outputs.cache-matched-key == ''
        uses: actions/cache/save@v5
        with:
          path: docs/assets/figures/benchmarks
          key: ${{ steps.cache-benchmark-charts.outputs.cache-primary-key }}

      - name: Build Zensical site
        run: uv run --no-project --isolated --with zensical zensical build --clean

      - name: Summarize docs deploy trace
        env:
          CACHE_EDA_HIT: ${{ steps.cache-eda-figures.outputs.cache-hit }}
          CACHE_TIMELINE_HIT: ${{ steps.cache-tech-timeline.outputs.cache-hit }}
          CACHE_BENCH_HIT: ${{ steps.cache-benchmark-charts.outputs.cache-hit }}
          CACHE_BENCH_MATCHED_KEY: ${{ steps.cache-benchmark-charts.outputs.cache-matched-key }}
          GENERATION_NEEDED: ${{ steps.generation-check.outputs.needed }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          site_dir = Path("site")
          trace = {
              "generation_needed": os.environ["GENERATION_NEEDED"] == "true",
              "cache_hits": {
                  "eda": os.environ["CACHE_EDA_HIT"] == "true",
                  "tech_timeline": os.environ["CACHE_TIMELINE_HIT"] == "true",
                  "benchmark_charts": os.environ["CACHE_BENCH_HIT"] == "true",
              },
              "generated_outputs": {
                  "eda": os.environ["CACHE_EDA_HIT"] != "true",
                  "tech_timeline": os.environ["CACHE_TIMELINE_HIT"] != "true",
                  "benchmark_charts": not os.environ["CACHE_BENCH_MATCHED_KEY"],
              },
              "site_file_count": sum(1 for path in site_dir.rglob("*") if path.is_file()),
              "site_exists": site_dir.exists(),
          }
          Path("docs-deploy-trace.json").write_text(json.dumps(trace, indent=2, sort_keys=True), encoding="utf-8")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Docs deploy trace\n\n")
              handle.write(f"- generation needed: {trace['generation_needed']}\\n")
              handle.write(
                  "- cache hits: "
                  f"eda={trace['cache_hits']['eda']}, "
                  f"tech_timeline={trace['cache_hits']['tech_timeline']}, "
                  f"benchmark_charts={trace['cache_hits']['benchmark_charts']}\\n"
              )
              handle.write(
                  "- generated this run: "
                  f"eda={trace['generated_outputs']['eda']}, "
                  f"tech_timeline={trace['generated_outputs']['tech_timeline']}, "
                  f"benchmark_charts={trace['generated_outputs']['benchmark_charts']}\\n"
              )
              handle.write(f"- built site files: {trace['site_file_count']}\\n")
          PY

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Upload docs deploy trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-deploy-trace
          path: docs-deploy-trace.json

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5